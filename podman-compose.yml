version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - gateway

  gateway:
    build:
      context: ./gateway
      dockerfile: Containerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://gateway:gateway@postgres:5432/inference_gw
      - REDIS_URL=redis://redis:6379/0
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - GRPC_WORKER_HOST=worker
      - GRPC_WORKER_PORT=50051
      - JWT_SECRET=change-me-in-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRY_MINUTES=30
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  worker:
    build:
      context: ./worker
      dockerfile: Containerfile
    ports:
      - "50051:50051"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_DISABLE_SSL_VERIFY=true
      - GRPC_PORT=50051
      - WORKER_ID=worker-1

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: inference_gw
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d inference_gw"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: docker.io/library/redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9001:9000"
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./scripts/init_clickhouse.sql:/docker-entrypoint-initdb.d/init.sql
      - ./scripts/clickhouse-config/default-user.xml:/etc/clickhouse-server/users.d/default-user.xml
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  ch_data:
