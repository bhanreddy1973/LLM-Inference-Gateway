# Render Blueprint — deploy with "New Blueprint Instance" on render.com
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: acheron-api
    runtime: python
    region: singapore
    plan: free
    rootDir: .
    buildCommand: |
      pip install -r gateway/requirements.txt && pip install -r worker/requirements.txt
    startCommand: cd gateway && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: INFERENCE_MODE
        value: local
      - key: CLICKHOUSE_HOST
        value: disabled
      - key: CLICKHOUSE_PORT
        value: "8123"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
